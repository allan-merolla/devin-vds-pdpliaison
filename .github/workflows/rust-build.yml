name: Build & Test PDP Liaison (Rust)

on:
  push:
    branches: [main]
    paths:
      - 'rust-pdpliaison/**'
      - '.github/workflows/rust-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'rust-pdpliaison/**'
      - '.github/workflows/rust-build.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Tests & Lint (Linux) ──
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-pdpliaison
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-pdpliaison/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-pdpliaison/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy -- -W clippy::all -D warnings

  # ── Build Linux x86_64 ──
  build-linux:
    name: Build Linux x86_64
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-pdpliaison
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-pdpliaison/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust-pdpliaison/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release
        run: cargo build --release

      - name: List artifacts
        run: |
          echo "=== Shared library ==="
          ls -la target/release/libpdp_liaison.so || true
          echo "=== Static library ==="
          ls -la target/release/libpdp_liaison.a || true
          echo "=== File info ==="
          file target/release/libpdp_liaison.so || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdp-liaison-linux-x64
          path: |
            rust-pdpliaison/target/release/libpdp_liaison.so
            rust-pdpliaison/target/release/libpdp_liaison.a
            rust-pdpliaison/pdp_liaison.h
          if-no-files-found: error

  # ── Build Windows x86_64 ──
  build-windows:
    name: Build Windows x86_64
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust-pdpliaison
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-pdpliaison/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust-pdpliaison/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release
        run: cargo build --release

      - name: List artifacts
        shell: pwsh
        run: |
          Write-Host "=== DLL ==="
          Get-ChildItem target/release/pdp_liaison.dll -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== Import lib ==="
          Get-ChildItem target/release/pdp_liaison.dll.lib -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== Static lib ==="
          Get-ChildItem target/release/pdp_liaison.lib -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdp-liaison-windows-x64
          path: |
            rust-pdpliaison/target/release/pdp_liaison.dll
            rust-pdpliaison/target/release/pdp_liaison.dll.lib
            rust-pdpliaison/target/release/pdp_liaison.lib
            rust-pdpliaison/pdp_liaison.h
          if-no-files-found: warn

  # ── Build Windows x86_64 (MSVC) ──
  build-windows-msvc:
    name: Build Windows x86_64 (MSVC)
    needs: test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust-pdpliaison
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-pdpliaison/target
          key: ${{ runner.os }}-msvc-cargo-release-${{ hashFiles('rust-pdpliaison/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-release-

      - name: Build release (MSVC)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: List artifacts
        shell: pwsh
        run: |
          $dir = "target/x86_64-pc-windows-msvc/release"
          Write-Host "=== DLL ==="
          Get-ChildItem "$dir/pdp_liaison.dll" -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "=== Import lib ==="
          Get-ChildItem "$dir/pdp_liaison.dll.lib" -ErrorAction SilentlyContinue | Format-Table Name, Length

      - name: Upload Windows MSVC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdp-liaison-windows-x64-msvc
          path: |
            rust-pdpliaison/target/x86_64-pc-windows-msvc/release/pdp_liaison.dll
            rust-pdpliaison/target/x86_64-pc-windows-msvc/release/pdp_liaison.dll.lib
            rust-pdpliaison/target/x86_64-pc-windows-msvc/release/pdp_liaison.lib
            rust-pdpliaison/pdp_liaison.h
          if-no-files-found: warn
